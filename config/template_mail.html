<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nuevo mensaje de contacto</title>
  <!-- MAIL_STYLES -->
</head>
<body>
  <div class="mail-wrapper">
    <div class="mail-card">
      <div class="mail-header">
        <img src="cid:head_adminio" class="mail-header-img" alt="Adminio Perú">
      </div>

      <div class="mail-content">
        <h2 class="mail-title">Nuevo mensaje recibido</h2>
        <table class="mail-table">
          <tr><td>&#128197; <strong>Fecha:</strong></td><td>{{fecha}}</td></tr>
          <tr><td>&#128100; <strong>Nombre:</strong></td><td>{{nombre}}</td></tr>
          <tr><td>&#128231; <strong>Correo:</strong></td><td>{{correo}}</td></tr>
          <tr><td>&#128241; <strong>Teléfono :</strong></td><td>{{telefono}}</td></tr>
          <tr><td>&#127970; <strong>Edificio:</strong></td><td>{{edificio}}</td></tr>
          <tr><td>&#128205; <strong>Distrito:</strong></td><td>{{distrito}}</td></tr>
          <tr><td>&#128172; <strong>Mensaje:</strong></td><td>{{mensaje}}</td></tr>
        </table>
      </div>

      <div class="mail-footer">
        &copy; Adminio Perú - Sistema de Contacto
      </div>
    </div>
  </div>
</body>
</html>
